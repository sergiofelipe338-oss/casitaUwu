<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dibujo con HTML y CSS</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#87CEEB;
}

/* SOL */
.sol{
    width:120px;
    height:120px;
    background:yellow;
    border-radius:50%;
    position:absolute;
    top:50px;
    right:80px;
    box-shadow:0 0 40px yellow;
}

/* PASTO */
.pasto{
    position:absolute;
    bottom:0;
    width:100%;
    height:200px;
    background:green;
}

/* CASA */
.casa{
    position:relative;
    width:300px;
    height:220px;
    background:#d2691e;
}

/* TECHO */
.techo{
    position:absolute;
    top:-120px;
    left:-20px;
    width:0;
    height:0;
    border-left:170px solid transparent;
    border-right:170px solid transparent;
    border-bottom:120px solid #8b0000;
}

/* PUERTA */
.puerta{
    position:absolute;
    bottom:0;
    left:110px;
    width:80px;
    height:120px;
    background:#5c3317;
}

/* VENTANAS */
.ventana1,
.ventana2{
    position:absolute;
    width:60px;
    height:60px;
    background:#add8e6;
    border:4px solid black;
}

.ventana1{
    top:50px;
    left:30px;
}

.ventana2{
    top:50px;
    right:30px;
}

</style>
</head>

<body>

<div class="sol"></div>

<div class="casa">
    
    <div class="techo"></div>

    <div class="ventana1"></div>
    <div class="ventana2"></div>

    <div class="puerta"></div>

</div>

<div class="pasto"></div>

</body>
</html><em></em>
